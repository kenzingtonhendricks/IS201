<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiss, Marry, Kill</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #ffecd2);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 36px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      text-align: center;
    }

    .emoji-row {
      font-size: 36px;
      margin-bottom: 10px;
      letter-spacing: 8px;
    }

    h1 {
      font-size: 28px;
      color: #c0392b;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 30px;
      font-style: italic;
    }

    .input-group {
      margin-bottom: 16px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #555;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #f0c0c0;
      border-radius: 10px;
      font-size: 15px;
      font-family: Georgia, serif;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #e74c3c; }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-family: Georgia, serif;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(231,76,60,0.4);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(231,76,60,0.5);
    }

    button:active { transform: translateY(0); }

    .results {
      display: none;
      margin-top: 28px;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .result-title {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .result-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #fff5f5;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 12px;
      border: 2px solid #fde0e0;
      text-align: left;
      transition: transform 0.2s;
    }

    .result-card:hover { transform: scale(1.02); }

    .result-emoji { font-size: 32px; }

    .result-label {
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .result-name {
      font-size: 20px;
      font-weight: bold;
      color: #222;
    }

    .kiss .result-label { color: #e84393; }
    .kiss { border-color: #fbb6d6; background: #fff0f8; }

    .marry .result-label { color: #e6a817; }
    .marry { border-color: #fde9a2; background: #fffbf0; }

    .kill .result-label { color: #888; }
    .kill { border-color: #ddd; background: #f9f9f9; }

    .play-again {
      margin-top: 16px;
      background: linear-gradient(135deg, #a29bfe, #6c5ce7);
      box-shadow: 0 4px 15px rgba(108,92,231,0.4);
    }

    .play-again:hover {
      box-shadow: 0 6px 20px rgba(108,92,231,0.5);
    }

    .error {
      color: #e74c3c;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="emoji-row">💋 💍 💀</div>
  <h1>Kiss, Marry, Kill</h1>
  <p class="subtitle">Enter 3 names and let fate decide...</p>

  <div id="form-section">
    <div class="input-group">
      <label>Person 1</label>
      <input type="text" id="name1" placeholder="Enter a name..." maxlength="30">
    </div>
    <div class="input-group">
      <label>Person 2</label>
      <input type="text" id="name2" placeholder="Enter a name..." maxlength="30">
    </div>
    <div class="input-group">
      <label>Person 3</label>
      <input type="text" id="name3" placeholder="Enter a name..." maxlength="30">
    </div>

    <p class="error" id="error-msg">⚠️ Please enter all 3 names before generating!</p>

    <button onclick="generate()">✨ Generate Results</button>
  </div>

  <div class="results" id="results">
    <p class="result-title">The verdict is in...</p>

    <div class="result-card kiss">
      <div class="result-emoji">💋</div>
      <div>
        <div class="result-label">Kiss</div>
        <div class="result-name" id="kiss-name"></div>
      </div>
    </div>

    <div class="result-card marry">
      <div class="result-emoji">💍</div>
      <div>
        <div class="result-label">Marry</div>
        <div class="result-name" id="marry-name"></div>
      </div>
    </div>

    <div class="result-card kill">
      <div class="result-emoji">💀</div>
      <div>
        <div class="result-label">Kill</div>
        <div class="result-name" id="kill-name"></div>
      </div>
    </div>

    <button class="play-again" onclick="reset()">🔄 Play Again</button>
  </div>
</div>

<script>
  function generate() {
    const n1 = document.getElementById('name1').value.trim();
    const n2 = document.getElementById('name2').value.trim();
    const n3 = document.getElementById('name3').value.trim();
    const error = document.getElementById('error-msg');

    if (!n1 || !n2 || !n3) {
      error.style.display = 'block';
      return;
    }

    error.style.display = 'none';

    // Shuffle the 3 names randomly
    const names = [n1, n2, n3];
    for (let i = names.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [names[i], names[j]] = [names[j], names[i]];
    }

    document.getElementById('kiss-name').textContent = names[0];
    document.getElementById('marry-name').textContent = names[1];
    document.getElementById('kill-name').textContent = names[2];

    document.getElementById('form-section').style.display = 'none';
    const results = document.getElementById('results');
    results.style.display = 'block';
  }

  function reset() {
    document.getElementById('name1').value = '';
    document.getElementById('name2').value = '';
    document.getElementById('name3').value = '';
    document.getElementById('results').style.display = 'none';
    document.getElementById('form-section').style.display = 'block';
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') generate();
  });
</script>

</body>
</html>
